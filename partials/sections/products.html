<section
  id="san-pham-son-an-toan"
  class="section products-section"
  aria-labelledby="products-heading"
>
  <div class="section-container">
    <div class="section-head is-center">
      <h2 id="products-heading" class="section-title">Các sản phẩm cho phòng em bé an toàn</h2>
      <p class="section-lead">
        Dòng sản phẩm chuyên biệt cho từng khu vực phòng của bé — từ tường chính đến khu vẽ sáng
        tạo.
      </p>
    </div>

    <ul class="products-grid" data-products>
      {{#each products}}
      <li class="card product-card">
        <div class="card__media placeholder-img" style="--img-ratio: 4/3" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <circle cx="9" cy="11" r="2" />
            <path d="M3 17 L9 12 L14 15 L21 9" />
          </svg>
        </div>
        <h3 class="card__title">
          {{name}}{{#if tag}} <span class="tag">{{tag}}</span>{{/if}}
        </h3>
        <p class="card__desc">{{desc}}</p>
        <p class="product-card__price">{{price}}</p>
        <a class="card__link" href="{{href}}">{{cta}}</a>
      </li>
      {{/each}}
    </ul>
  </div>
</section>
