<section class="section-banner is-dark journey-section" aria-labelledby="journey-heading">
  <div class="section-banner__inner">
    <h2 id="journey-heading" class="section-banner__title">Bắt đầu hành trình của bé</h2>
    <p class="section-banner__lead">
      Nhận tư vấn miễn phí và khám phá cách OneCoat bảo vệ phòng bé của bạn.
    </p>
    <form class="journey-form" onsubmit="event.preventDefault(); this.reset();">
      <label class="visually-hidden" for="journey-email">Email</label>
      <input id="journey-email" type="email" placeholder="Nhập email của bạn" required />
      <button type="submit">Gửi ngay</button>
    </form>
    <p class="journey-fineprint">
      Bằng cách gửi, bạn đồng ý với điều khoản và chính sách của chúng tôi
    </p>
  </div>
</section>
